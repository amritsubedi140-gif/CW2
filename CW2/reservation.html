<!doctype html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Hotel Buddha</title>

<link rel="stylesheet" href="style.css">
</head>

<body>

<header>
  <img src="logo.png" class="logo" alt="Hotel Buddha logo">
  <div class="brand">Hotel Buddha</div>
</header>

<main id="mainView">
  <section id="card">
    <div class="card-head">
      <img src="logo.png" class="small-logo">
      <div class="title">Reserve a Room</div>
    </div>

    <label>Full Name</label><input id="name">
    <label>Email</label><input id="email" type="email">
    <label>Contact</label><input id="contact">
    <label>Check-in</label><input id="checkin" type="date">
    <label>Check-out</label><input id="checkout" type="date">
    <label>Guests</label>
    <select id="guests"><option>1</option><option>2</option><option>3</option><option>4</option></select>

    <label>Room Type</label>
    <select id="room">
      <option value="">Select</option>
      <option>Super Room</option>
      <option>Deluxe Room</option>
      <option>Family Room</option>
    </select>

    <button id="submitBtn" class="btn">Confirm Reservation</button>
  </section>

  <aside class="info">
    <h3>Room & Pricing</h3>
    <div class="room"><span>Super Room</span><span>£95</span></div>
    <div class="room"><span>Deluxe Room</span><span>£140</span></div>
    <div class="room"><span>Family Room</span><span>£180</span></div>
  </aside>
</main>

<section id="success">
  <img src="logo.png" class="success-logo">
  <h2>Reservation Confirmed</h2>
  <p>Your booking is confirmed.</p>
  <div id="summary"></div>
  <button id="backBtn" class="btn back">Back</button>
</section>

<div class="footer">© 2026 Hotel Buddha</div>

<script src="script.js"></script>
</body>
</html>
